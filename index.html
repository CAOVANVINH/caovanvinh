    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
        .schedule-card {
            background-color: #ffffff;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 8px 15px -6px rgba(0, 0, 0, 0.05);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .schedule-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 12px 20px -8px rgba(0, 0, 0, 0.08);
        }
        .day-header {
            border-bottom: 2px solid #f1f5f9;
        }
        .schedule-section {
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .schedule-section.extra {
            background-color: #eff6ff; /* Màu xanh dương nhẹ cho Nga */
            border-color: #dbeafe;
        }
        .schedule-section.extra-b {
            background-color: #f5f3ff; /* Màu tím nhẹ cho Huyền */
            border-color: #ede9fe;
        }
        .schedule-section.extra-c {
            background-color: #fffbeb; /* Màu vàng nhẹ cho Quang */
            border-color: #fef3c7;
        }
        .schedule-title {
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2563eb;
            margin-bottom: 0.75rem;
        }
        .schedule-title.title-b {
            color: #4f46e5;
        }
        .schedule-title.title-c {
            color: #d97706;
        }
        .schedule-icon {
            margin-right: 0.5rem;
        }
        textarea {
            resize: none;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease-in-out;
            padding: 0.75rem;
            border-radius: 0.75rem;
            min-height: 4rem;
            color: #1e293b;
            background-color: #ffffff;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .message-box {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .message-box.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .editable-textarea {
            background-color: #ffffff;
            border-color: #93c5fd;
            box-shadow: 0 0 0 2px rgba(147, 197, 253, 0.3);
        }
        .editable-textarea-b {
            background-color: #ffffff;
            border-color: #c7d2fe;
            box-shadow: 0 0 0 2px rgba(199, 210, 254, 0.3);
        }
        .editable-textarea-c {
            background-color: #ffffff;
            border-color: #fcd34d;
            box-shadow: 0 0 0 2px rgba(252, 211, 77, 0.3);
        }
        .day-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .day-button.active {
            background-color: #1e293b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(30, 41, 59, 0.25);
            transform: scale(1.05);
        }
        .empty-state {
            color: #94a3b8;
            font-style: italic;
            text-align: center;
            padding: 0.75rem;
        }
    </style>

<body class="min-h-screen flex flex-col items-center p-4 md:p-6 text-slate-800">

        function startPollingFallback() {
            if (pollingInterval) return;
            console.log("Kích hoạt chế độ tải dự phòng HTTP Polling (mỗi 8 giây)...");
            pollingInterval = setInterval(async () => {
                try {
                    await fetchInitialData(true);
                } catch (e) {
                    console.warn("Background sync failed:", e);
                }
            }, 8000);
        }

        // Hiện thông báo trạng thái
        function showMessage(message, type = 'success') {
            messageBox.textContent = message;
            messageBox.classList.remove('bg-green-600', 'bg-rose-600', 'bg-amber-600');
            
            if (type === 'success') {
                messageBox.classList.add('bg-green-600');
            } else if (type === 'warning') {
                messageBox.classList.add('bg-amber-600');
            } else {
                messageBox.classList.add('bg-rose-600');
            }
            
            messageBox.classList.add('show');
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 3000);
        }

        function showLoading(show, message = 'Đang kết nối...') {
            loadingMessage.textContent = message;
            if (show) {
                loadingOverlay.style.display = 'flex';
                setTimeout(() => loadingOverlay.classList.remove('opacity-0'), 10);
            } else {
                loadingOverlay.classList.add('opacity-0');
                setTimeout(() => loadingOverlay.style.display = 'none', 300);
            }
        }

        function autoResizeTextareas() {

        // Tính toán hiển thị ngày thích hợp (Trước 18h hiện hôm nay, Sau 18h hiện ngày mai)
        function getTargetDayName() {
            const nowInVietnam = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Ho_Chi_Minh"}));
            const currentHour = nowInVietnam.getHours();
            const todayJSIndex = nowInVietnam.getDay();
            
            let targetDayJSIndex;
            if (currentHour >= 18) {
                targetDayJSIndex = (todayJSIndex === 6) ? 0 : todayJSIndex + 1;
            } else {
                targetDayJSIndex = todayJSIndex;
            }

            const targetScheduleIndex = targetDayJSIndex === 0 ? 6 : targetDayJSIndex - 1;
            return daysOfWeek[targetScheduleIndex];
        }

        function updateHeaderDate() {
            const now = new Date();
            const dateOptions = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                timeZone: 'Asia/Ho_Chi_Minh'
            };
            const vietnamDate = now.toLocaleString('vi-VN', dateOptions);
            dateDisplayElement.textContent = `${vietnamDate}`;
        }

        async function initializeSupabase() {
            showLoading(true, 'Đang kết nối cơ sở dữ liệu gia đình...');
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                await pingSupabase();
                await fetchInitialData(false);
                
                try {
                    startRealtimeListeners();
                } catch (realtimeError) {
                    console.warn("WebSocket không khả dụng trong Canvas. Kích hoạt HTTP Polling...", realtimeError);
                    startPollingFallback();
                }
                
            } catch (error) {
                console.error("Lỗi kết nối database:", error);
                showMessage("Đang xem ở Chế độ Xem Ngoại Tuyến (Offline View)", 'warning');
                startPollingFallback();
            } finally {
                showLoading(false);
            }
        }
        
        async function pingSupabase() {
            try {
                const now = new Date();
                await supabase.from('settings').upsert({
                    id: 'last_ping_record',
                    last_ping: now.toISOString()
                }, { onConflict: 'id' });
            } catch (error) {
                console.warn("Ping Supabase failed:", error);
            }
        }

        function startRealtimeListeners() {
            try {
                const settingsChannel = supabase.channel('public:settings')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, payload => {
                        if (payload.new && payload.new.id === 'student_names') {
                            updateNamesUI(payload.new);
                        }
                    });

                settingsChannel.subscribe((status, err) => {
                    if (err || status === 'CHANNEL_ERROR') {
                        startPollingFallback();
                    }
                });

                const schedulesChannel = supabase.channel('public:schedules')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'schedules' }, payload => {
                        if (payload.new) {
                            renderDay(payload.new.day_id, payload.new);
                        }
                    });

                schedulesChannel.subscribe((status, err) => {
                    if (err || status === 'CHANNEL_ERROR') {
                        startPollingFallback();
                    }
                });
            } catch (error) {
                startPollingFallback();
            }
        }
        
        async function fetchInitialData(quiet = false) {
            if (!quiet) showLoading(true, 'Đang tải dữ liệu lịch mới nhất...');
            try {
                const { data: namesData, error: namesError } = await supabase.from('settings').select('*').eq('id', 'student_names').single();
                if (!namesError && namesData) {
                    updateNamesUI(namesData);
                }

                const { data: schedulesData, error: schedulesError } = await supabase.from('schedules').select('*');
                if (!schedulesError && schedulesData) {
                    const scheduleMap = schedulesData.reduce((acc, curr) => {
                        acc[curr.day_id] = curr;
                        return acc;
                    }, {});
                    renderAllSchedules(scheduleMap);
                }
                
                if (!quiet) {
                    setInitialView();
                }
                autoResizeTextareas();
            } catch (err) {
                console.error("Lỗi lấy dữ liệu:", err);
            } finally {
                if (!quiet) showLoading(false);
            }
        }

        function updateNamesUI(names) {
            student1Name = names.student1_name || 'Cao Trần Hằng Nga';
            student2Name = names.student2_name || 'Cao Trần Thảo Huyền';
            student3Name = names.student3_name || 'Cao Vinh Quang';

            student1Header.textContent = student1Name;
            student2Header.textContent = student2Name;
            student3Header.textContent = student3Name;

            student1NameInput.value = student1Name;
            student2NameInput.value = student2Name;
            student3NameInput.value = student3Name;
        }

        function renderAllSchedules(data) {
            daysOfWeek.forEach(day => {
                const dayId = day.replace(/\s/g, '');
                renderDay(dayId, data[dayId] || {});
            });
        }

        function renderDay(dayId, schedule) {
            const studentATextarea = document.getElementById(`schedule-A-${dayId}`);
            const extraStudentAContainer = document.getElementById(`extra-schedule-A-${dayId}`);
            const studentBTextarea = document.getElementById(`schedule-B-${dayId}`);
            const extraStudentBContainer = document.getElementById(`extra-schedule-B-${dayId}`);
            const studentCTextarea = document.getElementById(`schedule-C-${dayId}`);
            const extraStudentCContainer = document.getElementById(`extra-schedule-C-${dayId}`);
            
            if (studentATextarea) {
                studentATextarea.value = schedule.student_a || '';
            }
            if (studentBTextarea) {
                studentBTextarea.value = schedule.student_b || '';
            }
            if (studentCTextarea) {
                studentCTextarea.value = schedule.student_c || '';
            }
            
            try {
                const extraA = JSON.parse(schedule.extra_student_a || '[]');
                renderExtraScheduleEntries(extraStudentAContainer, dayId, 'A', extraA);
            } catch (e) {
                renderExtraScheduleEntries(extraStudentAContainer, dayId, 'A', []);
            }
            
            try {
                const extraB = JSON.parse(schedule.extra_student_b || '[]');
                renderExtraScheduleEntries(extraStudentBContainer, dayId, 'B', extraB);
            } catch (e) {
                renderExtraScheduleEntries(extraStudentBContainer, dayId, 'B', []);
            }

            try {
                const extraC = JSON.parse(schedule.extra_student_c || '[]');
                renderExtraScheduleEntries(extraStudentCContainer, dayId, 'C', extraC);
            } catch (e) {
                renderExtraScheduleEntries(extraStudentCContainer, dayId, 'C', []);
            }
            
            autoResizeTextareas();
        }
        
        function renderExtraScheduleEntries(container, dayId, studentId, entries) {
            if (!container) return;
            container.innerHTML = '';
            
            const emptyState = document.getElementById(`empty-extra-${studentId}-${dayId}`);
            
            if (entries.length === 0) {
                if (emptyState) emptyState.classList.remove('hidden');
                return;
            } else {
                if (emptyState) emptyState.classList.add('hidden');
            }

            entries.forEach(entry => {
                const entryDiv = document.createElement('div');
                entryDiv.innerHTML = createExtraScheduleEntryHtml(entry, studentId);
                container.appendChild(entryDiv.firstElementChild);
            });
        }
        
        function collectExtraScheduleData(dayId, studentId) {
            const container = document.getElementById(`extra-schedule-${studentId}-${dayId}`);
            if (!container) return [];
            
            const entries = [];
            container.querySelectorAll('.extra-schedule-entry').forEach(entryDiv => {
                const start_time = entryDiv.querySelector('[data-field="start_time"]').value;
                const end_time = entryDiv.querySelector('[data-field="end_time"]').value;
                const teacher_name = entryDiv.querySelector('[data-field="teacher_name"]').value;
                entries.push({ start_time, end_time, teacher_name });
            });
            return entries;
        }

        async function saveSchedule(dayId, field, value) {
            if (!supabase) return;
            showLoading(true, 'Đang tự động lưu lịch học...');
            try {
                const updateObject = {
                    day_id: dayId,
                    [field]: value
                };
                const { error } = await supabase
                    .from('schedules')
                    .upsert(updateObject, { onConflict: 'day_id' });

                if (error) throw error;
                showMessage('Đã tự động lưu thay đổi!');
            } catch (error) {
                showMessage('Lỗi khi lưu dữ liệu: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function saveExtraSchedule(dayId, studentId) {
            const extraScheduleData = collectExtraScheduleData(dayId, studentId);
            const field = studentId === 'A' ? 'extra_student_a' : (studentId === 'B' ? 'extra_student_b' : 'extra_student_c');
            await saveSchedule(dayId, field, JSON.stringify(extraScheduleData));
        }

        async function saveStudentNames() {
            if (!supabase) return;
            const s1Name = student1NameInput.value.trim() || 'Cao Trần Hằng Nga';
            const s2Name = student2NameInput.value.trim() || 'Cao Trần Thảo Huyền';
            const s3Name = student3NameInput.value.trim() || 'Cao Vinh Quang';

            showLoading(true, 'Đang cập nhật tên học sinh...');
            try {
                const { error } = await supabase.from('settings').upsert({
                    id: 'student_names',
                    student1_name: s1Name,
                    student2_name: s2Name,
                    student3_name: s3Name
                }, { onConflict: 'id' });

                if (error) throw error;
                updateNamesUI({ student1_name: s1Name, student2_name: s2Name, student3_name: s3Name });
                showMessage('Đã cập nhật tên các con thành công!');
            } catch (error) {
                showMessage('Lỗi cập nhật tên: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        function selectDay(dayName) {
            isAdminMode = false;
            selectedDay = dayName;
            updateDisplay();

            document.querySelectorAll('.day-button').forEach(button => {
                button.classList.remove('active');
            });
            const selectedButton = document.querySelector(`[data-day="${dayName}"]`);
            if (selectedButton) {
                selectedButton.classList.add('active');
            }
            autoResizeTextareas();
        }
        
        function setInitialView() {
            const autoDayName = getTargetDayName();
            selectDay(autoDayName);
            const autoButton = document.querySelector(`[data-day="Tự Động"]`);
            if (autoButton) {
                autoButton.classList.add('active');
            }
        }

        toggleAdminBtn.addEventListener('click', async () => {
            if (isAdminMode) {
                if (student1NameInput.value.trim() !== student1Name || 
                    student2NameInput.value.trim() !== student2Name || 
                    student3NameInput.value.trim() !== student3Name) {
                    await saveStudentNames();
                }
                setInitialView();
            } else {
                isAdminMode = true;
                updateDisplay();
                // Render lại lịch học thêm theo cấu trúc nhập liệu (admin)
                await fetchInitialData(true);
            }
            autoResizeTextareas();
        });

        daySelectionButtonsContainer.addEventListener('click', (event) => {
            const button = event.target.closest('.day-button');
            if (!button) return;

            const dayName = button.dataset.day;
            if (dayName === 'Tự Động') {
                setInitialView();
            } else {
                selectDay(dayName);
            }
        });

        window.addEventListener('load', () => {
            generateScheduleContainers();
            initializeSupabase();
            updateHeaderDate();
            setInterval(updateHeaderDate, 60000);

            // Bắt sự kiện bấm thêm lịch hoặc xóa lịch học thêm
            document.addEventListener('click', (e) => {
                if (e.target.closest('.add-extra-btn')) {
                    const btn = e.target.closest('.add-extra-btn');
                    if (!isAdminMode) return; 
                    const dayId = btn.dataset.dayId;
                    const studentId = btn.dataset.studentId;
                    const container = document.getElementById(`extra-schedule-${studentId}-${dayId}`);
                    if (!container) return; 
                    
                    const newEntryDiv = document.createElement('div');
                    newEntryDiv.innerHTML = createExtraScheduleEntryHtml({}, studentId);
                    container.appendChild(newEntryDiv.firstElementChild);
                    
                    const emptyState = document.getElementById(`empty-extra-${studentId}-${dayId}`);
                    if (emptyState) emptyState.classList.add('hidden');
                    
                    saveExtraSchedule(dayId, studentId);
                } else if (e.target.closest('.delete-extra-btn')) {
                    const btn = e.target.closest('.delete-extra-btn');
                    if (!isAdminMode) return; 
                    const entryDiv = btn.closest('.extra-schedule-entry');
                    const parentContainer = btn.closest('[id^="extra-schedule-"]');
                    if (parentContainer) {
                        const idParts = parentContainer.id.split('-');
                        const studentId = idParts[2];
                        const dayId = idParts[3];
                        entryDiv.remove();
                        
                        if (parentContainer.querySelectorAll('.extra-schedule-entry').length === 0) {
                            const emptyState = document.getElementById(`empty-extra-${studentId}-${dayId}`);
                            if (emptyState) emptyState.classList.remove('hidden');
                        }
                        
                        saveExtraSchedule(dayId, studentId);
                    }
                }
            });

            // Tự động lưu khi bỏ focus chuột khỏi ô nhập liệu (Blur event)
            document.addEventListener('blur', (e) => {
                const input = e.target.closest('[data-field]');
                const textarea = e.target;

                if (input) {
                    const parentContainer = input.closest('[id^="extra-schedule-"]');
                    if (parentContainer) {
                        const idParts = parentContainer.id.split('-');
                        const studentId = idParts[2];
                        const dayId = idParts[3];
                        saveExtraSchedule(dayId, studentId);
                    }
                } else if (textarea.id && textarea.id.startsWith('schedule-') && !textarea.readOnly) {
                    const idParts = textarea.id.split('-');
                    const studentId = idParts[1];
                    const dayId = idParts[2];
                    const field = `student_${studentId.toLowerCase()}`;
                    saveSchedule(dayId, field, textarea.value);
                }
            }, true);
        });
    </script>
</body>
</html>
